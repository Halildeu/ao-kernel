name: Test

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual rerun reason (e.g. stacked retarget)"
        required: false
        type: string

jobs:
  event-gate:
    name: event-gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      trigger_reason: ${{ steps.decide.outputs.trigger_reason }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_PATH: ${{ github.event_path }}
          DISPATCH_REASON: ${{ github.event.inputs.reason || '' }}
        run: |
          should_run=false
          trigger_reason=ignored

          case "$EVENT_NAME" in
            push)
              should_run=true
              trigger_reason="push"
              ;;
            workflow_dispatch)
              should_run=true
              trigger_reason="workflow_dispatch:${DISPATCH_REASON:-manual}"
              ;;
            pull_request)
              case "$EVENT_ACTION" in
                opened|reopened|synchronize|ready_for_review)
                  should_run=true
                  trigger_reason="pull_request:$EVENT_ACTION"
                  ;;
                edited)
                  # Retarget (`base` changed) must rerun the full PR gate.
                  if jq -e '.changes.base.ref.from' "$EVENT_PATH" >/dev/null 2>&1; then
                    should_run=true
                    trigger_reason="pull_request:retargeted"
                  fi
                  ;;
              esac
              ;;
          esac

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "trigger_reason=$trigger_reason" >> "$GITHUB_OUTPUT"
      - name: Explain trigger decision
        run: |
          echo "should_run=${{ steps.decide.outputs.should_run }}"
          echo "trigger_reason=${{ steps.decide.outputs.trigger_reason }}"

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: [event-gate]
    if: needs.event-gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        # v3.8 H6: 2-try retry guard for transient PyPI/TLS flakes
        # (one-off `SSL: DECRYPTION_FAILED_OR_BAD_RECORD_MAC` observed
        # on v3.7 release CI; cheap insurance across all pip installs).
        run: pip install ruff || (sleep 5 && pip install ruff)
      - name: Ruff check
        run: ruff check ao_kernel/ tests/

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [event-gate]
    if: needs.event-gate.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        # v3.8 H6 retry guard (see lint job note).
        run: pip install -e ".[dev,llm,metrics]" || (sleep 5 && pip install -e ".[dev,llm,metrics]")
      - name: Run tests
        run: pytest tests/ --ignore=tests/benchmarks -v --cov=ao_kernel --cov-branch --cov-report=term-missing

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [event-gate]
    if: needs.event-gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        # v3.8 H6 retry guard (see lint job note).
        run: pip install -e ".[dev,llm,metrics]" || (sleep 5 && pip install -e ".[dev,llm,metrics]")
      - name: Run tests with coverage gate
        run: |
          pytest tests/ --ignore=tests/benchmarks --cov=ao_kernel --cov-branch --cov-report=xml --cov-report=term-missing
          coverage report --fail-under=85
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  packaging-smoke:
    name: packaging-smoke
    runs-on: ubuntu-latest
    needs: [event-gate, test, coverage, lint, typecheck]
    if: needs.event-gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install build tool
        run: pip install build || (sleep 5 && pip install build)
      - name: Build wheel and run packaging smoke
        run: python scripts/packaging_smoke.py

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: [event-gate]
    if: needs.event-gate.outputs.should_run == 'true'
    # CNS-006 Q4: after the 131-error cleanup (PR #56), typecheck is a real
    # gate. _internal/* is still under per-module ignore (D13).
    #
    # Install `mcp` extra too: some ignores depend on the mcp SDK being
    # importable (untyped decorators on server.list_tools etc). Without mcp
    # those decorators resolve to Any and the ignores become "unused".
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        # v3.8 H6 retry guard (see lint job note).
        run: pip install -e ".[dev,llm,mcp,metrics]" || (sleep 5 && pip install -e ".[dev,llm,mcp,metrics]")
      - name: Mypy
        run: mypy ao_kernel/

  benchmark-fast:
    name: benchmark-fast
    runs-on: ubuntu-latest
    needs: [event-gate, test]
    if: needs.event-gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        # v3.8 H6 retry guard (see lint job note).
        run: pip install -e ".[dev,llm,mcp,metrics]" || (sleep 5 && pip install -e ".[dev,llm,mcp,metrics]")
      - name: Run PR-B7 benchmarks (fast mode) + emit scorecard
        env:
          AO_SCORECARD_OUTPUT: benchmark_scorecard.v1.json
        run: pytest tests/benchmarks/ -q
      - name: Upload head scorecard
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-${{ github.sha }}
          path: benchmark_scorecard.v1.json
          if-no-files-found: warn
      - name: Upload main baseline scorecard
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-main
          path: benchmark_scorecard.v1.json
          if-no-files-found: warn
          overwrite: true

  scorecard:
    name: scorecard
    runs-on: ubuntu-latest
    needs: [event-gate, benchmark-fast]
    if: needs.event-gate.outputs.should_run == 'true' && github.event_name == 'pull_request'
    continue-on-error: true  # Advisory surface — never red-check PRs.
    permissions:
      pull-requests: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        # v3.8 H6 retry guard (see lint job note).
        run: pip install -e ".[dev,llm,mcp,metrics]" || (sleep 5 && pip install -e ".[dev,llm,mcp,metrics]")
      - name: Download head scorecard
        uses: actions/download-artifact@v8
        with:
          name: scorecard-${{ github.sha }}
          path: head/
      # SHA-pinned dawidd6/action-download-artifact@v20
      # (resolved against tag v20 for Node 24 runner compatibility).
      - name: Download main baseline scorecard
        uses: dawidd6/action-download-artifact@8305c0f1062bb0d184d09ef4493ecb9288447732
        with:
          workflow: test.yml
          branch: main
          name: scorecard-main
          path: ./baseline/
          if_no_artifact_found: warn
      - name: Compose scorecard comment
        run: |
          ao-kernel scorecard compare \
            --baseline baseline/benchmark_scorecard.v1.json \
            --head head/benchmark_scorecard.v1.json \
            > scorecard_comment.md
      - name: Post sticky PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ao-kernel scorecard post-comment \
            --pr ${{ github.event.pull_request.number }} \
            --body-file scorecard_comment.md \
            --sentinel '<!-- ao-scorecard -->' || true

  extras-install:
    name: extras-install
    runs-on: ubuntu-latest
    needs: [event-gate]
    if: needs.event-gate.outputs.should_run == 'true'
    continue-on-error: true  # Optional extras smoke — non-blocking
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install and smoke-import each extra
        # v3.8 H6: tiny inline retry helper — retry once on pip flake.
        run: |
          pip_install() {
            pip install "$@" || (sleep 5 && pip install "$@")
          }
          pip_install -e ".[llm]"      && python -c "import tenacity, tiktoken; print('llm OK')"
          pip_install -e ".[otel]"     && python -c "import opentelemetry; print('otel OK')"
          pip_install -e ".[mcp]"      && python -c "import mcp; print('mcp OK')"
          pip_install -e ".[mcp-http]" && python -c "import starlette, uvicorn; print('mcp-http OK')"
          pip_install -e ".[metrics]"  && python -c "import prometheus_client; print('metrics OK')"
