name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,llm]"

      - name: Lint
        run: ruff check ao_kernel/ tests/

      - name: Test with coverage
        run: |
          pytest tests/ -v \
            --cov=ao_kernel \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Extras install test (Python 3.13 only)
        if: matrix.python-version == '3.13'
        run: |
          pip install -e ".[llm]" && python -c "import tenacity; import tiktoken; print('llm OK')"
          pip install -e ".[otel]" && python -c "import opentelemetry; print('otel OK')"

      - name: Coverage gate (Python 3.13 only)
        if: matrix.python-version == '3.13'
        run: |
          coverage report --fail-under=70

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
