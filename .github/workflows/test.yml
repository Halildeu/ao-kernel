name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check ao_kernel/ tests/

  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,llm]"
      - name: Run tests
        run: pytest tests/ -v --cov=ao_kernel --cov-branch --cov-report=term-missing

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,llm]"
      - name: Run tests with coverage gate
        run: |
          pytest tests/ --cov=ao_kernel --cov-branch --cov-report=xml --cov-report=term-missing
          coverage report --fail-under=70
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    # CNS-006 Q4: after the 131-error cleanup (PR #56), typecheck is a real
    # gate. _internal/* is still under per-module ignore (D13).
    #
    # Install `mcp` extra too: some ignores depend on the mcp SDK being
    # importable (untyped decorators on server.list_tools etc). Without mcp
    # those decorators resolve to Any and the ignores become "unused".
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,llm,mcp]"
      - name: Mypy
        run: mypy ao_kernel/

  extras-install:
    name: extras-install
    runs-on: ubuntu-latest
    continue-on-error: true  # Optional extras smoke — non-blocking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install and smoke-import each extra
        run: |
          pip install -e ".[llm]"      && python -c "import tenacity, tiktoken; print('llm OK')"
          pip install -e ".[otel]"     && python -c "import opentelemetry; print('otel OK')"
          pip install -e ".[mcp]"      && python -c "import mcp; print('mcp OK')"
          pip install -e ".[mcp-http]" && python -c "import starlette, uvicorn; print('mcp-http OK')"
