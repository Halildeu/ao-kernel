name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check ao_kernel/ tests/

  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,llm,metrics]"
      - name: Run tests
        run: pytest tests/ --ignore=tests/benchmarks -v --cov=ao_kernel --cov-branch --cov-report=term-missing

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,llm,metrics]"
      - name: Run tests with coverage gate
        run: |
          pytest tests/ --ignore=tests/benchmarks --cov=ao_kernel --cov-branch --cov-report=xml --cov-report=term-missing
          coverage report --fail-under=85
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    # CNS-006 Q4: after the 131-error cleanup (PR #56), typecheck is a real
    # gate. _internal/* is still under per-module ignore (D13).
    #
    # Install `mcp` extra too: some ignores depend on the mcp SDK being
    # importable (untyped decorators on server.list_tools etc). Without mcp
    # those decorators resolve to Any and the ignores become "unused".
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,llm,mcp,metrics]"
      - name: Mypy
        run: mypy ao_kernel/

  benchmark-fast:
    name: benchmark-fast
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,llm,mcp,metrics]"
      - name: Run PR-B7 benchmarks (fast mode)
        run: pytest tests/benchmarks/ -q

  packaging-smoke:
    name: packaging-smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel
      - name: Install wheel into fresh virtualenv
        run: |
          tmpdir="$(mktemp -d)"
          python -m venv "$tmpdir/venv"
          "$tmpdir/venv/bin/python" -m pip install --upgrade pip
          "$tmpdir/venv/bin/python" -m pip install dist/*.whl
          smoke_dir="$(mktemp -d)"
          (
            cd "$smoke_dir"
            "$tmpdir/venv/bin/ao-kernel" version
            "$tmpdir/venv/bin/python" -m ao_kernel version
            "$tmpdir/venv/bin/python" -m ao_kernel.cli version
            "$tmpdir/venv/bin/python" "$GITHUB_WORKSPACE/examples/demo_review.py" --cleanup
          )

  extras-install:
    name: extras-install
    runs-on: ubuntu-latest
    continue-on-error: true  # Optional extras smoke — non-blocking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install and smoke-import each extra
        run: |
          pip install -e ".[llm]"      && python -c "import tenacity, tiktoken; print('llm OK')"
          pip install -e ".[otel]"     && python -c "import opentelemetry; print('otel OK')"
          pip install -e ".[mcp]"      && python -c "import mcp; print('mcp OK')"
          pip install -e ".[mcp-http]" && python -c "import starlette, uvicorn; print('mcp-http OK')"
          pip install -e ".[metrics]"  && python -c "import prometheus_client; print('metrics OK')"
