[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ao-kernel"
version = "0.1.0"
description = "Governed AI orchestration runtime — policy-driven, fail-closed, evidence-trail"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Halil Kocoglu"}
]
keywords = ["ai", "orchestrator", "llm", "policy", "governance", "fail-closed", "evidence"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
    "Typing :: Typed",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = ["jsonschema>=4.23.0"]

[project.urls]
Homepage = "https://github.com/Halildeu/ao-kernel"
Repository = "https://github.com/Halildeu/ao-kernel"
Issues = "https://github.com/Halildeu/ao-kernel/issues"

[project.optional-dependencies]
llm = [
    "tenacity>=9.0.0",
    "tiktoken>=0.9.0",
]
dev = [
    "pytest",
    "pytest-cov",
    "ruff",
    "mypy",
    "build",
    "twine",
    "mutmut",
]
otel = [
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-exporter-otlp",
]
mcp = [
    "mcp>=1.0.0",
]
pgvector = [
    "pgvector",
    "psycopg2-binary",
]

[project.scripts]
ao-kernel = "ao_kernel.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["ao_kernel", "ao_kernel.*", "src", "src.*"]
exclude = [
    "*_test",
    "*_test.*",
    "*_contract_test",
    "*_contract_test.*",
    "*.tests",
    "*.tests.*",
]

[tool.setuptools.package-data]
"ao_kernel.defaults" = ["**/*.json"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers"
markers = [
    "quality_waiver: exempt from test quality gate (requires justification)",
]

[tool.coverage.run]
source = ["ao_kernel", "src"]
branch = true
omit = [
    "*/test_*",
    "*/_test*",
    "*/conftest.py",
]

[tool.coverage.report]
show_missing = true
fail_under = 70
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
]

[tool.mutmut]
paths_to_mutate = "ao_kernel/"
tests_dir = "tests/"
runner = "python -m pytest -x --tb=no -q"
